<svg xmlns="http://www.w3.org/2000/svg" width="460" height="120" viewBox="0 0 460 120" fill="none">
  <title>BaonTracker PRO</title>
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#27AA83"/>
      <stop offset="1" stop-color="#1A9F6E"/>
    </linearGradient>
  </defs>

  <!-- Mark (simple pig icon in a rounded square). Background is transparent overall. -->
  <g transform="translate(12,12)">
    <rect x="0" y="0" width="96" height="96" rx="26" fill="url(#brand)" opacity="0.14"/>
    <circle cx="48" cy="54" r="26" fill="url(#brand)"/>
    <circle cx="38" cy="50" r="4" fill="#FFFFFF"/>
    <circle cx="58" cy="50" r="4" fill="#FFFFFF"/>
    <rect x="38" y="60" width="20" height="14" rx="7" fill="#FFFFFF" opacity="0.95"/>
    <circle cx="44" cy="67" r="2.2" fill="#1A9F6E"/>
    <circle cx="52" cy="67" r="2.2" fill="#1A9F6E"/>
    <path d="M28 40c3-7 9-12 18-14" stroke="#1A9F6E" stroke-width="6" stroke-linecap="round" opacity="0.35"/>
    <path d="M68 40c-3-7-9-12-18-14" stroke="#1A9F6E" stroke-width="6" stroke-linecap="round" opacity="0.35"/>
  </g>

  <!-- Text -->
  <g font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
    <text x="126" y="62" font-size="44" font-weight="900" fill="#27AA83" letter-spacing="-0.8">BaonTracker</text>
    <text x="128" y="92" font-size="18" font-weight="800" fill="#FFAE00" letter-spacing="0.6">PRO</text>
  </g>
</svg>
